<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan Lite — Diabetes Prediction</title>
    <meta name="description" content="AI-powered diabetes risk prediction using machine learning. Enter patient details for instant analysis.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="app">
        <!-- Header -->
        <header class="header" id="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
                        <path d="M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4"/>
                        <circle cx="20" cy="10" r="2"/>
                    </svg>
                </div>
                <h1 class="logo-text">Medi<span class="gradient-text">Scan</span> <span class="logo-lite">Lite</span></h1>
            </div>
            <p class="tagline">AI-Powered Diabetes Risk Prediction</p>
        </header>

        <!-- Main Card -->
        <main class="main-card" id="mainCard">
            <div class="card-header">
                <div class="card-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div>
                    <h2>Patient Analysis</h2>
                    <p class="card-subtitle">Enter medical parameters for prediction</p>
                </div>
            </div>

            <form id="predictForm" class="form-grid">
                <div class="input-group">
                    <label for="pregnancies">Pregnancies</label>
                    <input type="number" id="pregnancies" value="1" min="0" max="20" required>
                    <span class="input-hint">0–20</span>
                </div>
                <div class="input-group">
                    <label for="glucose">Glucose Level</label>
                    <input type="number" id="glucose" value="120" min="0" max="300" required>
                    <span class="input-hint">mg/dL</span>
                </div>
                <div class="input-group">
                    <label for="bp">Blood Pressure</label>
                    <input type="number" id="bp" value="70" min="0" max="200" required>
                    <span class="input-hint">mm Hg</span>
                </div>
                <div class="input-group">
                    <label for="skin">Skin Thickness</label>
                    <input type="number" id="skin" value="20" min="0" max="100" required>
                    <span class="input-hint">mm</span>
                </div>
                <div class="input-group">
                    <label for="insulin">Insulin Level</label>
                    <input type="number" id="insulin" value="80" min="0" max="900" required>
                    <span class="input-hint">µU/mL</span>
                </div>
                <div class="input-group">
                    <label for="bmi">BMI</label>
                    <input type="number" id="bmi" value="25.0" min="0" max="70" step="0.1" required>
                    <span class="input-hint">kg/m²</span>
                </div>
                <div class="input-group">
                    <label for="dpf">Diabetes Pedigree</label>
                    <input type="number" id="dpf" value="0.5" min="0" max="3" step="0.01" required>
                    <span class="input-hint">Function</span>
                </div>
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" value="30" min="1" max="120" required>
                    <span class="input-hint">Years</span>
                </div>
            </form>

            <button id="predictBtn" class="predict-btn" onclick="predict()">
                <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span>Predict</span>
                <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>

            <!-- Result -->
            <div id="result" class="result hidden"></div>
        </main>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="stat-label">Dataset</span>
                <span class="stat-value">768 Records</span>
            </div>
            <div class="stat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span class="stat-label">Algorithm</span>
                <span class="stat-value">SVM</span>
            </div>
            <div class="stat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span class="stat-label">Accuracy</span>
                <span class="stat-value">~78%</span>
            </div>
            <div class="stat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span class="stat-label">Features</span>
                <span class="stat-value">8 Inputs</span>
            </div>
        </div>

        <footer class="footer">
            <p>Built by <strong>Chinmaya Kumar Prusty</strong> · For demonstration purposes only</p>
        </footer>
    </div>

     <!-- <div class="watermark">
     Built by Chinmaya Kumar Prusty
     </div> -->

      <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>


</body>
</html>
